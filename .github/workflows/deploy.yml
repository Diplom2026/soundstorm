name: Deploy to AWS

on:
  push:
    branches:
      - pipeline-setup

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: read
        run: |
          TAG=$(tr -d '\n\r ' < VERSION)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKERHUB_REPO }}:${{ env.TAG }} .

      - name: Push image
        run: docker push ${{ secrets.DOCKERHUB_REPO }}:${{ env.TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: read
        run: |
          TAG=$(tr -d '\n\r ' < VERSION)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Debug tag
        run: echo "TAG = '${{ env.TAG }}'"

      - name: Deploy to AWS VM
        run: |
          IMAGE="${{ secrets.DOCKERHUB_REPO }}:${{ env.TAG }}"
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} "
            set -e
            echo 'Stopping old container...'
            docker stop soundstorm || true
            docker rm soundstorm || true

            echo 'Pulling new image...'
            docker pull $IMAGE

            echo 'Starting new container...'
            docker run -d \
              --name soundstorm \
              --restart always \
              -p 80:80 \
              -p 443:443 \
              -v /etc/letsencrypt/live/soundstorm.pp.ua/fullchain.pem:/certs/fullchain.pem:ro \
              -v /etc/letsencrypt/live/soundstorm.pp.ua/privkey.pem:/certs/privkey.pem:ro \
              $IMAGE

            echo 'Deployment complete.'
          "

  passive_scan:
    name: Passive Security Scan (ZAP Baseline)
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm \
            -v $(pwd):/zap/wrk \
            ghcr.io/zaproxy/zaproxy:weekly \
            zap-baseline.py \
              -t https://soundstorm.pp.ua \
              -r zap-passive-report.html

      - name: Copy report from container output
        run: |
          CONTAINER_ID=$(docker create ghcr.io/zaproxy/zaproxy:weekly)
          docker cp $CONTAINER_ID:/zap/zap-passive-report.html ./zap-passive-report.html || true
          docker rm $CONTAINER_ID

      - name: Upload Passive Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-passive-report
          path: zap-passive-report.html
