name: Deploy to EC2

on:
  push:
    branches:
      - pipeline-setup

jobs:

  # ----------------------------------------------------
  # JOB 1: BUILD & PUSH IMAGES
  # ----------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-backend:$VERSION ./backend/MusicStreamingApi

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-frontend:$VERSION ./frontend

      - name: Build nginx image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-nginx:$VERSION ./nginx

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-backend:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-frontend:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-nginx:$VERSION


  # ----------------------------------------------------
  # JOB 2: ZAP BASELINE SCAN (informational only)
  # ----------------------------------------------------
  zapscan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        continue-on-error: true
        with:
          target: https://soundstorm.pp.ua
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          cmd_options: "--autooff -m 1 -T 2"
          allow_issue_writing: false
          fail_action: ignore

      - name: Convert ZAP report to TXT
        run: cp report_md.md zap-baseline-report.txt

      - name: Upload ZAP Baseline Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-baseline-report.txt



  # ----------------------------------------------------
  # JOB 3: DEPLOY TO EC2 (with cleanup)
  # ----------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: zapscan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd soundstorm

            echo "VERSION=$VERSION" > .env

            docker-compose pull
            docker-compose down
            docker-compose up -d --remove-orphans

            # Remove old unused images
            docker image prune -af
