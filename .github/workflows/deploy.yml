name: Deploy to AWS

on:
  push:
    branches:
      - pipeline-setup

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: read
        run: |
          TAG=$(tr -d '\n\r ' < VERSION)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKERHUB_REPO }}:${{ env.TAG }} .

      - name: Push image
        run: docker push ${{ secrets.DOCKERHUB_REPO }}:${{ env.TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: read
        run: |
          TAG=$(tr -d '\n\r ' < VERSION)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Debug tag
        run: echo "TAG = '${{ env.TAG }}'"

      - name: Deploy to AWS VM
        run: |
          IMAGE="${{ secrets.DOCKERHUB_REPO }}:${{ env.TAG }}"
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} "
            set -e
            echo 'Stopping old container...'
            docker stop soundstorm || true
            docker rm soundstorm || true

            echo 'Pulling new image...'
            docker pull $IMAGE

            echo 'Starting new container...'
            docker run -d \
              --name soundstorm \
              --restart always \
              -p 80:80 \
              -p 443:443 \
              -v /etc/letsencrypt/live/soundstorm.pp.ua/fullchain.pem:/certs/fullchain.pem:ro \
              -v /etc/letsencrypt/live/soundstorm.pp.ua/privkey.pem:/certs/privkey.pem:ro \
              $IMAGE

            echo 'Deployment complete.'
          "

  scan-full:
    name: Full Security Scan (ZAP Daemon Mode)
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Start ZAP in daemon mode
        run: |
          docker run -d --name zap-daemon \
            -p 8080:8080 \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -daemon \
              -port 8080 \
              -host 0.0.0.0 \
              -config api.disablekey=true \
              -config api.addrs.addr.name=.* \
              -config api.addrs.addr.regex=true

      - name: Wait for ZAP to start
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/JSON/core/view/version/ > /dev/null; then
              echo "ZAP is ready"
              break
            fi
            echo "Waiting for ZAP..."
            sleep 5
          done

      - name: Spider the target
        run: |
          curl "http://localhost:8080/JSON/spider/action/scan/?url=https://soundstorm.pp.ua"
          sleep 10

      - name: Wait for spider to finish
        run: |
          while [ "$(curl -s http://localhost:8080/JSON/spider/view/status/ | jq -r '.status')" != "100" ]; do
            echo "Spider running..."
            sleep 5
          done

      - name: Active scan
        run: |
          curl "http://localhost:8080/JSON/ascan/action/scan/?url=https://soundstorm.pp.ua"
          sleep 10

      - name: Wait for active scan to finish
        run: |
          while [ "$(curl -s http://localhost:8080/JSON/ascan/view/status/ | jq -r '.status')" != "100" ]; do
            echo "Active scan running..."
            sleep 5
          done

      - name: Generate HTML report
        run: |
          curl "http://localhost:8080/OTHER/core/other/htmlreport/" -o zap-full-report.html

      - name: Upload Full Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-full-report
          path: zap-full-report.html
