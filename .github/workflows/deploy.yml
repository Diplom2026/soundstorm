name: Deploy to AWS

on:
  push:
    branches:
      - pipeline-setup

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      now_tag: ${{ steps.read.outputs.now_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read VERSION file
        id: read
        run: |
          TAG=$(cat VERSION)
          echo "now_tag=$TAG" >> $GITHUB_OUTPUT

  build-and-push:
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_REPO }}:${{ needs.bump-version.outputs.now_tag }} .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_REPO }}:${{ needs.bump-version.outputs.now_tag }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Deploy to AWS VM
        run: |
          IMAGE="${{ secrets.DOCKERHUB_REPO }}:${{ needs.bump-version.outputs.now_tag }}"

          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} "
            set -e

            echo 'Stopping old container...'
            docker stop soundstorm || true
            docker rm soundstorm || true

            echo 'Pulling new image...'
            docker pull $IMAGE

            echo 'Starting new container...'
            docker run -d \
              --name soundstorm \
              --restart always \
              -p 80:80 \
              -p 443:443 \
              -v /etc/letsencrypt/live/soundstorm.pp.ua/fullchain.pem:/certs/fullchain.pem:ro \
              -v /etc/letsencrypt/live/soundstorm.pp.ua/privkey.pem:/certs/privkey.pem:ro \
              $IMAGE

            echo 'Deployment complete.'
          "
