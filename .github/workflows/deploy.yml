name: Deploy to EC2

on:
  push:
    branches:
      - pipeline-setup

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_ENV

      - name: Log version
        run: echo "Deploying version $VERSION"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-backend:$VERSION ./backend/MusicStreamingApi

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-frontend:$VERSION ./frontend

      - name: Build nginx image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-nginx:$VERSION ./nginx

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-backend:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-frontend:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/soundstorm-nginx:$VERSION

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd soundstorm

            echo "VERSION=$VERSION" > .env

            docker compose pull
            docker compose down
            docker compose up -d --remove-orphans
