name: Safe Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Sync project to VM
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" ./ \
            ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USERNAME }}/soundstorm

      - name: Restart container
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} "
            cd /home/${{ secrets.VM_USERNAME }}/soundstorm &&
            docker stop soundstorm || true &&
            docker rm soundstorm || true &&
            docker build -t soundstorm:latest . &&
            docker run -d --name soundstorm \
              -p 80:80 -p 443:443 \
              -v /home/${{ secrets.VM_USERNAME }}/certs:/certs \
              soundstorm:latest
          "
