name: Build and Deploy Pipeline

on:
  push:
    branches: [ "pipeline-setup" ]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Bump version
        id: bump
        run: |
          current=$(cat VERSION)
          num=${current#v}
          next=v$((num + 1))
          echo "$next" > VERSION
          echo "new_tag=$next" >> $GITHUB_OUTPUT

      - name: Commit new version
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add VERSION
          git commit -m "Auto bump to ${{ steps.bump.outputs.new_tag }}" || echo "No changes to commit"
          git push

  build-and-push:
    runs-on: ubuntu-latest
    needs: bump-version
    env:
      IMAGE_NAME: xxvladxx/soundstorm
      IMAGE_TAG: ${{ needs.bump-version.outputs.new_tag }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

