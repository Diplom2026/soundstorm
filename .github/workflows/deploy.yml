name: Deploy and Scan

on:
  push:
    branches:
      - pipeline-setup

jobs:
  deploy:
    name: Deploy to EC2 and Run ZAP Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Copy files to EC2
        run: |
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no" ./ ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USERNAME }}/soundstorm

      - name: Trigger remote build and deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} "
            cd /home/${{ secrets.VM_USERNAME }}/soundstorm &&
            docker build -t ${{ secrets.DOCKERHUB_REPO }}:\$(cat VERSION) . &&
            docker stop soundstorm || true &&
            docker rm soundstorm || true &&
            docker run -d --name soundstorm -p 80:80 -p 443:443 ${{ secrets.DOCKERHUB_REPO }}:\$(cat VERSION)
          "

      - name: Run OWASP ZAP Baseline Scan on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }} "
            docker run --rm \
              -v /home/${{ secrets.VM_USERNAME }}/zap-reports:/zap/wrk \
              ghcr.io/zaproxy/zaproxy:weekly \
              zap-baseline.py -t https://soundstorm.pp.ua -r zap-baseline-report.html
          "

      - name: Download ZAP report from EC2
        run: |
          scp -o StrictHostKeyChecking=no ${{ secrets.VM_USERNAME }}@${{ secrets.VM_HOST }}:/home/${{ secrets.VM_USERNAME }}/zap-reports/zap-baseline-report.html .

      - name: Upload ZAP Baseline Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-baseline-report.html
