name: ZAP Monitor

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 03:00 UTC

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: https://soundstorm.pp.ua
          cmd_options: "-t 60"
          allow_issue_writing: false
          fail_on_error: false
          report_file: zap-monitor-report.txt

      - name: Upload ZAP Monitor Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-monitor-report
          path: zap-monitor-report.txt
